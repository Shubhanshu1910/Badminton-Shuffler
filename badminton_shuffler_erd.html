<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#0c447c' : '#E6F1FB',
    primaryBorderColor: dark ? '#378ADD' : '#185FA5',
    primaryTextColor: dark ? '#B5D4F4' : '#042C53',
  },
});
const diagram = `erDiagram
  Session {
    TEXT id PK
    TEXT name
    INTEGER courts
    INTEGER duration_seconds
    TEXT rotation_type
    TEXT status
    INTEGER created_at
    INTEGER ended_at
  }
  Player {
    TEXT id PK
    TEXT session_id FK
    TEXT name
    TEXT color
    TEXT initial
    INTEGER games_played
    INTEGER games_won
    INTEGER wait_count
    INTEGER last_played_round
    TEXT status
    INTEGER added_at
  }
  Court {
    TEXT id PK
    TEXT session_id FK
    INTEGER court_number
    TEXT status
    INTEGER current_match_id FK
  }
  Round {
    TEXT id PK
    TEXT session_id FK
    INTEGER round_number
    TEXT status
    INTEGER started_at
    INTEGER ended_at
  }
  Match {
    TEXT id PK
    TEXT round_id FK
    TEXT court_id FK
    TEXT winner
    BOOLEAN skipped
    INTEGER completed_at
  }
  Team {
    TEXT id PK
    TEXT match_id FK
    TEXT label
    TEXT player_a_id FK
    TEXT player_b_id FK
    BOOLEAN is_winner
  }
  Queue {
    TEXT id PK
    TEXT session_id FK
    TEXT player_id FK
    INTEGER position
    INTEGER wait_since_round
    TEXT reason
  }
  Statistics {
    TEXT id PK
    TEXT player_id FK
    TEXT session_id FK
    INTEGER total_games
    INTEGER total_wins
    INTEGER total_waits
    REAL win_rate
    REAL fairness_delta
    TEXT partner_history
    TEXT opponent_history
  }

  Session ||--o{ Player : "has"
  Session ||--o{ Court : "has"
  Session ||--o{ Round : "contains"
  Session ||--o{ Queue : "manages"
  Session ||--|| Statistics : "summarised by"
  Round ||--o{ Match : "includes"
  Court ||--o{ Match : "hosts"
  Match ||--o{ Team : "has 2"
  Player ||--o{ Team : "plays in"
  Player ||--o{ Queue : "waits in"
  Player ||--o{ Statistics : "tracked by"
`;
const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;
document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
